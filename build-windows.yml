name: Build Windows EXE

on:
  workflow_dispatch:          # lets you run it manually from the Actions tab
  push:
    tags:
      - 'v*'                  # auto-builds when you push a tag like v1.0.0

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'    # match the version you developed with

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build EXE
        run: |
          pyinstaller --noconfirm --clean --onefile --windowed --name MyApp --icon assets/icon.ico main.py

      - name: Upload EXE as artifact
        uses: actions/upload-artifact@v4
        with:
          name: MyApp-windows-x64
          path: dist/MyApp.exe

      - name: Attach EXE to a GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/MyApp.exe
