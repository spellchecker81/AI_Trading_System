name: Build EXE

on:
  push:
    branches: [ release/v1.0 ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build EXE
        run: |
          pyinstaller --onefile --windowed --name AI_Trading_System dashboard/launcher.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: AI_Trading_System-windows
          path: dist/AI_Trading_System.exe
